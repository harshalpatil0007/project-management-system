<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PMS Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#020617;
color:white;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:18px;
margin-bottom:40px;
}

.logoBox{
background:#2563eb;
padding:8px 12px;
border-radius:8px;
}

.menu a{
display:block;
padding:12px;
margin-bottom:10px;
text-decoration:none;
color:#94a3b8;
border-radius:8px;
}

.menu a:hover{
background:#1e293b;
color:white;
}

.active{
background:#1e293b;
color:white;
}

.logout{
color:#ef4444;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
padding:40px;
}

.title{
font-size:28px;
font-weight:bold;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

.roleText{
color:#94a3b8;
margin-top:5px;
}

/* CARDS */

.section{
margin-top:30px;
display:flex;
gap:30px;
flex-wrap:wrap;
}

.card{
background:#0f172a;
padding:25px;
width:350px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card h2{
margin-bottom:15px;
}

.card input, .card select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

.card button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

.card button:hover{
background:#1d4ed8;
}

/* PROGRESS BAR */

.progressBar{
width:350px;
height:20px;
background:#1e293b;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#22c55e;
}

/* TABLE */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:left;
border-bottom:1px solid #1e293b;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<div class="logo">
<div class="logoBox">P</div>
<span>PMS</span>
</div>

<div class="menu">
<a class="active">Dashboard</a>
<a>My Projects</a>
<a>Team Members</a>
</div>

</div>

<div class="logout" onclick="logout()">Sign Out</div>

</div>


<!-- MAIN -->

<div class="main">

<div class="title">Project Workspace</div>

<div class="subtitle">
Welcome, <span id="username"></span>. Here's what's happening today.
</div>

<p class="roleText">Role: <span id="role"></span></p>


<div class="section">

<!-- CREATE TASK (ADMIN ONLY) -->

<div class="card" id="createTaskSection">

<h2>Create Task</h2>

<input type="text" id="taskName" placeholder="Task Name">

<input type="text" id="description" placeholder="Description">

<select id="userSelect">
<option>Select User</option>
</select>

<select id="projectSelect">
<option>Select Project</option>
</select>

<button onclick="createTask()">Create Task</button>

</div>


<!-- UPDATE STATUS -->

<div class="card">

<h2>Update Task Status</h2>

<input type="text" id="taskId" placeholder="Task ID">

<select id="taskStatus">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<button onclick="updateStatus()">Update Status</button>

</div>


<!-- PROGRESS BAR -->

<div class="card">

<h2>Project Progress</h2>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

<p id="progressText">0% Completed</p>

</div>

</div>


<!-- TASK LIST -->

<h2 style="margin-top:40px">Tasks</h2>

<table>

<thead>
<tr>
<th>Task</th>
<th>Status</th>
</tr>
</thead>

<tbody id="taskTable"></tbody>

</table>

</div>


<script>

/* LOAD USERNAME */

const username = localStorage.getItem("username")

if(username){
document.getElementById("username").innerText = username
}

/* LOAD ROLE */

const role = localStorage.getItem("role")

if(role){
document.getElementById("role").innerText = role
}

/* ROLE BASED UI */

if(role !== "admin"){

const createSection = document.getElementById("createTaskSection")

if(createSection){
createSection.style.display="none"
}

}

/* LOGOUT */

function logout(){

localStorage.removeItem("token")
localStorage.removeItem("username")
localStorage.removeItem("role")

window.location.href="login.html"

}


/* LOAD USERS */

async function loadUsers(){

const res = await fetch("http://localhost:5000/api/users/all")

const users = await res.json()

const select = document.getElementById("userSelect")

users.forEach(user=>{

const option = document.createElement("option")

option.value = user._id
option.textContent = user.name

select.appendChild(option)

})

}


/* LOAD PROJECTS */

async function loadProjects(){

const res = await fetch("http://localhost:5000/api/projects/all")

const projects = await res.json()

const select = document.getElementById("projectSelect")

projects.forEach(project=>{

const option = document.createElement("option")

option.value = project._id
option.textContent = project.projectName

select.appendChild(option)

})

}


/* CREATE TASK */

async function createTask(){

const taskName = document.getElementById("taskName").value
const description = document.getElementById("description").value
const assignedTo = document.getElementById("userSelect").value
const projectId = document.getElementById("projectSelect").value

const res = await fetch("http://localhost:5000/api/tasks/create",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
taskName,
description,
assignedTo,
projectId
})

})

const data = await res.json()

alert(data.message)

loadTasks()

}


/* UPDATE STATUS */

async function updateStatus(){

const taskId = document.getElementById("taskId").value
const status = document.getElementById("taskStatus").value

const res = await fetch(`http://localhost:5000/api/tasks/update/${taskId}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({status})

})

const data = await res.json()

alert(data.message)

loadTasks()

}


/* LOAD TASKS */

async function loadTasks(){

const res = await fetch("http://localhost:5000/api/tasks/all")

const tasks = await res.json()

const table = document.getElementById("taskTable")

table.innerHTML=""

let completed=0

tasks.forEach(task=>{

if(task.status==="Completed") completed++

const row=`
<tr>
<td>${task.taskName}</td>
<td>${task.status}</td>
</tr>
`

table.innerHTML += row

})

const percent = tasks.length ? (completed/tasks.length)*100 : 0

document.getElementById("progress").style.width = percent + "%"

document.getElementById("progressText").innerText = percent.toFixed(0)+"% Completed"

}


/* INITIAL LOAD */

loadUsers()
loadProjects()
loadTasks()

</script>

</body>
</html>
