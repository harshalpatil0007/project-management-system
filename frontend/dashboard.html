<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TaskMaster Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:20px;
font-weight:bold;
}

.user{
display:flex;
align-items:center;
gap:15px;
}

.logout{
background:#ef4444;
border:none;
padding:8px 15px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* MAIN */

.container{
padding:40px;
}

.title{
font-size:32px;
font-weight:bold;
}

.subtitle{
color:#94a3b8;
margin-top:8px;
}

/* CARDS */

.cards{
display:flex;
gap:30px;
margin-top:40px;
}

.card{
background:#0f172a;
padding:25px;
border-radius:12px;
width:300px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card h3{
margin:0 0 10px 0;
}

.badge{
background:#4f46e5;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-left:10px;
}

.taskNumber{
font-size:40px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">📊 TaskMaster</div>

<div class="user">

<span id="username">User</span>

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>


<!-- CONTENT -->

<div class="container">

<div class="title">Hello 👋</div>

<div class="subtitle">
Welcome to your team task management dashboard.
</div>

<div class="cards">

<div class="card">

<h3>Role Assigned <span class="badge">Member</span></h3>

<p>You can view and complete tasks assigned to you.</p>

</div>


<div class="card">

<h3>Your Tasks</h3>

<div class="taskNumber" id="taskCount">0</div>

<p>Tasks assigned to you</p>

</div>

</div>

</div>


<script>

function logout(){

localStorage.removeItem("token")
window.location.href="login.html"

}

</script>

</body>
</html>
