<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PMS Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#020617;
color:white;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:18px;
margin-bottom:40px;
}

.logoBox{
background:#2563eb;
padding:8px 12px;
border-radius:8px;
}

.menu a{
display:block;
padding:12px;
margin-bottom:10px;
text-decoration:none;
color:#94a3b8;
border-radius:8px;
}

.menu a:hover{
background:#1e293b;
color:white;
}

.active{
background:#1e293b;
color:white;
}

.logout{
color:#ef4444;
cursor:pointer;
}

/* MAIN AREA */

.main{
flex:1;
padding:40px;
}

.title{
font-size:28px;
font-weight:bold;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

/* PROJECT CARD */

.projects{
margin-top:40px;
}

.card{
background:#0f172a;
padding:25px;
width:350px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.projectIcon{
background:#1e293b;
width:40px;
height:40px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:15px;
}

.projectTitle{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.projectDesc{
color:#94a3b8;
margin-bottom:15px;
}

.line{
height:1px;
background:#1e293b;
margin:10px 0;
}

.projectFooter{
display:flex;
justify-content:space-between;
font-size:12px;
color:#94a3b8;
}

.status{
background:#1e293b;
padding:4px 10px;
border-radius:20px;
}

</style>

</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<div class="logo">

<div class="logoBox">P</div>

<span>PMS</span>

</div>


<div class="menu">

<a class="active">Dashboard</a>

<a>My Projects</a>

<a>Team Members</a>

</div>

</div>


<div class="logout" onclick="logout()">

Sign Out

</div>

</div>



<!-- MAIN CONTENT -->

<div class="main">

<div class="title">Project Workspace</div>

<div class="subtitle">
Welcome, <span id="username"></span>. Here's what's happening today.
</div>


<div class="projects">

<div class="card">

<div class="projectIcon">📁</div>

<div class="projectTitle">PMS Launch</div>

<div class="projectDesc">
Initializing the Project Management System
</div>

<div class="line"></div>

<div class="projectFooter">

<span>03/03/2026</span>

<span class="status">Active</span>

</div>

</div>

</div>

</div>


<script>

/* LOAD USER NAME */

const username = localStorage.getItem("username")

if(username){

document.getElementById("username").innerText = username

}


/* LOGOUT FUNCTION */

function logout(){

localStorage.removeItem("token")
localStorage.removeItem("username")

window.location.href="login.html"

}

</script>

</body>

</html>
